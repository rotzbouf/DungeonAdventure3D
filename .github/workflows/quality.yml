name: Quality

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  gdlint:
    name: GDScript lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"

      - name: Run gdlint
        run: |
          FILES=$(find . -name "*.gd" \
            -not -path "./.git/*" \
            -not -path "./.tools/*" \
            -not -path "./.godot/*")
          echo "Linting $(echo "$FILES" | wc -l) GDScript files…"
          gdlint $FILES
